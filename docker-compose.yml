version: "3.9"

services:
  biblioteca-reserva:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: biblioteca-reserva
    restart: unless-stopped
    ports:
      - "9503:9503"
    environment:
      NODE_ENV: production
      PORT: 9503
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      INFISICAL_CLIENT_ID: "c7349fd9-0cbf-46ce-b31e-d0f5dfcd6fc1"
      INFISICAL_CLIENT_SECRET: "56ba915562cf841f6922c9e64c3adb23b417581ffad9f639d88d8969a84b8552"
      INFISICAL_PROJECT_ID: "a53610fd-1c06-4c97-abfb-83db65f335a5"
      INFISICAL_ENV: "dev"
      INFISICAL_SITE_URL: "https://app.infisical.com"
    env_file:
      - .env
    networks:
      - biblioteca-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9503/listar-ativas",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  biblioteca_network:
    external: true
