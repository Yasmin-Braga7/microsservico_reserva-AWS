version: '3.9'

services:
  microsservico_reserva:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: microsservico_reserva
    restart: unless-stopped
    ports:
      - "9503:9503"
    environment:
      NODE_ENV: production
      PORT: 9503
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
    env_file:
      - .env
    networks:
      - biblioteca-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9503/biblioteca/reserva"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  biblioteca_network:
    external: true
