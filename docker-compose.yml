version: "3.9"

services:
  biblioteca-reserva:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: biblioteca-reserva
    restart: unless-stopped
    ports:
      - "9503:9503"
    environment:
      NODE_ENV: production
      PORT: 9503
      # Valores vêm do .env local (não commitado) — não deixar valor fixo aqui.
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_ENV: ${INFISICAL_ENV:-dev}
      INFISICAL_SITE_URL: ${INFISICAL_SITE_URL:-https://app.infisical.com}
    env_file:
      - .env
    networks:
      - biblioteca-net  # corrigido: era "biblioteca_network" (underscore) mas o serviço
                        # referenciava "biblioteca-net" (hífen) — container ficava isolado
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          # corrigido: o prefixo /reserva foi adicionado ao server.js,
          # logo o health endpoint correto agora é /reserva/listar-ativas
          "http://localhost:9503/reserva/listar-ativas",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  # Nome padronizado para "biblioteca-net" — igual ao que o serviço declara acima
  # e ao que o docker-compose do Empréstimo também usa.
  biblioteca-net:
    external: true
