version: "3.9"

services:
  biblioteca-reserva:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: biblioteca-reserva
    restart: unless-stopped
    ports:
      - "9503:9503"
    environment:
      NODE_ENV: production
      PORT: 9503
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      INFISICAL_CLIENT_ID: "9407a4b1-03f1-4392-b460-afbea6868dbe"
      INFISICAL_CLIENT_SECRET: "7a756ae7145da1a2869046b6bb2a5a292f82f72b81432d7d8f0baae204ce1aff"
      INFISICAL_PROJECT_ID: "bfec726f-3e2c-416c-b106-82e1032f4c30"
      INFISICAL_ENV: "dev"
      INFISICAL_SITE_URL: "https://app.infisical.com"
    env_file:
      - .env
    networks:
      - biblioteca-net  # corrigido: era "biblioteca_network" (underscore) mas o serviço
                        # referenciava "biblioteca-net" (hífen) — container ficava isolado
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          # corrigido: o prefixo /reserva foi adicionado ao server.js,
          # logo o health endpoint correto agora é /reserva/listar-ativas
          "http://localhost:9503/reserva/listar-ativas",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  # Nome padronizado para "biblioteca-net" — igual ao que o serviço declara acima
  # e ao que o docker-compose do Empréstimo também usa.
  biblioteca-net:
    external: true
