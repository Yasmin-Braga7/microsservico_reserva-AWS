version: '3.9'

services:
  microsservico_reserva:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: microsservico_reserva
    restart: unless-stopped
    ports:
      - "9504:9504"
    environment:
      NODE_ENV: production
      PORT: 9504
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
    env_file:
      - .env
    networks:
      - biblioteca_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9504/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  biblioteca_network:
    external: true
